<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小役カウンター</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:10px;
}

h1{
    text-align:center;
    margin:5px 0 6px;
    font-size:24px;
}

#lampLine{
    width:100%;
    height:4px;
    background:#cccccc;
    margin:0 auto 10px;
    border-radius:2px;
    overflow:hidden;
    position:relative;
}

#lampFill{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    background:#00ff00;
}

.container{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row{
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 0;
    border-bottom:1px solid #ddd;
}

.label{
    width:90px;
    font-weight:bold;
    font-size:16px;
}

.grape{ color:#00aa00; }
.cherry{ color:#ff0000; }

.value{
    width:60px;
    text-align:center;
    font-size:20px;
    border:1px solid #ccc;
    border-radius:5px;
    padding:3px;
}

.rate{
    margin-left:auto;
    font-size:14px;
    color:#666;
}

button{
    width:42px;
    height:42px;
    font-size:22px;
}

.reset{
    width:100%;
    height:50px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>小役カウンター</h1>
<div id="lampLine"><div id="lampFill"></div></div>

<div class="container">

<div class="row">
<div class="label">総G</div>
<input id="game" class="value" type="number">
<button onclick="addGame()">+</button>
<button onclick="subGame()">-</button>
</div>

<div class="row">
<div class="label grape">ブドウ</div>
<input id="grape" class="value" type="number">
<button onclick="addGrape()">+</button>
<button onclick="subGrape()">-</button>
<div id="grapeRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label cherry">チェリー</div>
<input id="cherry" class="value" type="number">
<button onclick="addCherry()">+</button>
<button onclick="subCherry()">-</button>
<div id="cherryRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">ベル</div>
<input id="bell" class="value" type="number">
<button onclick="addBell()">+</button>
<button onclick="subBell()">-</button>
</div>

<div class="row">
<div class="label">ベルこぼし</div>
<input id="missBell" class="value" type="number">
<button onclick="addMissBell()">+</button>
<button onclick="subMissBell()">-</button>
</div>

<div class="row">
<div class="label">ピエロ</div>
<input id="pierrot" class="value" type="number">
<button onclick="addPierrot()">+</button>
<button onclick="subPierrot()">-</button>
</div>

<div class="row">
<div class="label">ピエロこぼし</div>
<input id="missPierrot" class="value" type="number">
<button onclick="addMissPierrot()">+</button>
<button onclick="subMissPierrot()">-</button>
</div>

<div class="row">
<div class="label">単独BIG</div>
<input id="soloBig" class="value" type="number">
<button onclick="addSoloBig()">+</button>
<button onclick="subSoloBig()">-</button>
</div>

<div class="row">
<div class="label">チェBIG</div>
<input id="cherryBig" class="value" type="number">
<button onclick="addCherryBig()">+</button>
<button onclick="subCherryBig()">-</button>
</div>

<div class="row">
<div class="label">単独REG</div>
<input id="soloReg" class="value" type="number">
<button onclick="addSoloReg()">+</button>
<button onclick="subSoloReg()">-</button>
</div>

<div class="row">
<div class="label">チェREG</div>
<input id="cherryReg" class="value" type="number">
<button onclick="addCherryReg()">+</button>
<button onclick="subCherryReg()">-</button>
</div>

<button class="reset" onclick="resetAll()">リセット</button>

</div>

<script>

let game = Number(localStorage.getItem("game")) || 0;
let grape = Number(localStorage.getItem("grape")) || 0;
let cherry = Number(localStorage.getItem("cherry")) || 0;

let bell = Number(localStorage.getItem("bell")) || 0;
let missBell = Number(localStorage.getItem("missBell")) || 0;
let pierrot = Number(localStorage.getItem("pierrot")) || 0;
let missPierrot = Number(localStorage.getItem("missPierrot")) || 0;

let soloBig = Number(localStorage.getItem("soloBig")) || 0;
let cherryBig = Number(localStorage.getItem("cherryBig")) || 0;
let soloReg = Number(localStorage.getItem("soloReg")) || 0;
let cherryReg = Number(localStorage.getItem("cherryReg")) || 0;

function flashLine(color){
    const fill = document.getElementById("lampFill");
    fill.style.background = color;
    fill.style.width = "100%";

    setTimeout(()=>{
        fill.style.width = "0%";
    }, 500);
}

function update(){

document.getElementById("game").value = game;
document.getElementById("grape").value = grape;
document.getElementById("cherry").value = cherry;

document.getElementById("bell").value = bell;
document.getElementById("missBell").value = missBell;
document.getElementById("pierrot").value = pierrot;
document.getElementById("missPierrot").value = missPierrot;

document.getElementById("soloBig").value = soloBig;
document.getElementById("cherryBig").value = cherryBig;
document.getElementById("soloReg").value = soloReg;
document.getElementById("cherryReg").value = cherryReg;

document.getElementById("grapeRate").innerText =
grape > 0 ? "1/" + (game/grape).toFixed(1) : "1/-";

document.getElementById("cherryRate").innerText =
cherry > 0 ? "1/" + (game/cherry).toFixed(1) : "1/-";

localStorage.setItem("game", game);
localStorage.setItem("grape", grape);
localStorage.setItem("cherry", cherry);
localStorage.setItem("bell", bell);
localStorage.setItem("missBell", missBell);
localStorage.setItem("pierrot", pierrot);
localStorage.setItem("missPierrot", missPierrot);
localStorage.setItem("soloBig", soloBig);
localStorage.setItem("cherryBig", cherryBig);
localStorage.setItem("soloReg", soloReg);
localStorage.setItem("cherryReg", cherryReg);
}

function syncInputs(){
game = Number(document.getElementById("game").value) || 0;
grape = Number(document.getElementById("grape").value) || 0;
cherry = Number(document.getElementById("cherry").value) || 0;
bell = Number(document.getElementById("bell").value) || 0;
missBell = Number(document.getElementById("missBell").value) || 0;
pierrot = Number(document.getElementById("pierrot").value) || 0;
missPierrot = Number(document.getElementById("missPierrot").value) || 0;
soloBig = Number(document.getElementById("soloBig").value) || 0;
cherryBig = Number(document.getElementById("cherryBig").value) || 0;
soloReg = Number(document.getElementById("soloReg").value) || 0;
cherryReg = Number(document.getElementById("cherryReg").value) || 0;
update();
}

document.addEventListener("input", syncInputs);

function addGame(){ game++; update(); flashLine("#00ff00"); }
function subGame(){ if(game>0) game--; update(); flashLine("#ff0000"); }

function addGrape(){ grape++; update(); flashLine("#00ff00"); }
function subGrape(){ if(grape>0) grape--; update(); flashLine("#ff0000"); }

function addCherry(){ cherry++; update(); flashLine("#00ff00"); }
function subCherry(){ if(cherry>0) cherry--; update(); flashLine("#ff0000"); }

function addBell(){ bell++; update(); flashLine("#00ff00"); }
function subBell(){ if(bell>0) bell--; update(); flashLine("#ff0000"); }

function addMissBell(){ missBell++; update(); flashLine("#00ff00"); }
function subMissBell(){ if(missBell>0) missBell--; update(); flashLine("#ff0000"); }

function addPierrot(){ pierrot++; update(); flashLine("#00ff00"); }
function subPierrot(){ if(pierrot>0) pierrot--; update(); flashLine("#ff0000"); }

function addMissPierrot(){ missPierrot++; update(); flashLine("#00ff00"); }
function subMissPierrot(){ if(missPierrot>0) missPierrot--; update(); flashLine("#ff0000"); }

function addSoloBig(){ soloBig++; update(); flashLine("#00ff00"); }
function subSoloBig(){ if(soloBig>0) soloBig--; update(); flashLine("#ff0000"); }

function addCherryBig(){ cherryBig++; update(); flashLine("#00ff00"); }
function subCherryBig(){ if(cherryBig>0) cherryBig--; update(); flashLine("#ff0000"); }

function addSoloReg(){ soloReg++; update(); flashLine("#00ff00"); }
function subSoloReg(){ if(soloReg>0) soloReg--; update(); flashLine("#ff0000"); }

function addCherryReg(){ cherryReg++; update(); flashLine("#00ff00"); }
function subCherryReg(){ if(cherryReg>0) cherryReg--; update(); flashLine("#ff0000"); }

function resetAll(){
game=0;
grape=0;
cherry=0;
bell=0;
missBell=0;
pierrot=0;
missPierrot=0;
soloBig=0;
cherryBig=0;
soloReg=0;
cherryReg=0;
update();
}

update();

</script>

</body>
</html>
