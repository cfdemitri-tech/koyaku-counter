<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小役カウンター</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:10px;
}

h1{
    text-align:center;
    margin:5px 0 10px;
    font-size:24px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row{
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 0;
    border-bottom:1px solid #ddd;
}

.label{
    width:90px;
    font-weight:bold;
    font-size:16px;
}

.grape{ color:#00aa00; }
.cherry{ color:#ff0000; }

.value{
    width:60px;
    text-align:center;
    font-size:20px;
    border:1px solid #ccc;
    border-radius:5px;
    padding:3px;
}

.rate{
    margin-left:auto;
    font-size:14px;
    color:#666;
}

button{
    width:42px;
    height:42px;
    font-size:22px;
}

.reset{
    width:100%;
    height:50px;
    margin-top:10px;
}

.flash-green{ box-shadow:0 0 0 3px #00ff00; }
.flash-red{ box-shadow:0 0 0 3px #ff0000; }
</style>
</head>

<body>

<h1>小役カウンター</h1>

<div class="container">

<div class="row">
<div class="label">総G</div>
<input id="game" class="value" type="number">
<button onclick="add('game')">+</button>
<button onclick="sub('game')">-</button>
</div>

<div class="row">
<div class="label grape">ブドウ</div>
<input id="grape" class="value" type="number">
<button onclick="add('grape')">+</button>
<button onclick="sub('grape')">-</button>
<div id="grapeRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label cherry">チェリー</div>
<input id="cherry" class="value" type="number">
<button onclick="add('cherry')">+</button>
<button onclick="sub('cherry')">-</button>
<div id="cherryRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">BIG合計</div>
<div id="bigTotal" class="value">0</div>
<div id="bigRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">REG合計</div>
<div id="regTotal" class="value">0</div>
<div id="regRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">ボナ合算</div>
<div id="bonusTotal" class="value">0</div>
<div id="bonusRate" class="rate">1/-</div>
</div>

<div class="row"><div class="label">ベル</div>
<input id="bell" class="value" type="number">
<button onclick="add('bell')">+</button>
<button onclick="sub('bell')">-</button></div>

<div class="row"><div class="label">ベルこぼし</div>
<input id="missBell" class="value" type="number">
<button onclick="add('missBell')">+</button>
<button onclick="sub('missBell')">-</button></div>

<div class="row"><div class="label">ピエロ</div>
<input id="pierrot" class="value" type="number">
<button onclick="add('pierrot')">+</button>
<button onclick="sub('pierrot')">-</button></div>

<div class="row"><div class="label">ピエロこぼし</div>
<input id="missPierrot" class="value" type="number">
<button onclick="add('missPierrot')">+</button>
<button onclick="sub('missPierrot')">-</button></div>

<div class="row"><div class="label">単独BIG</div>
<input id="soloBig" class="value" type="number">
<button onclick="add('soloBig')">+</button>
<button onclick="sub('soloBig')">-</button></div>

<div class="row"><div class="label">チェBIG</div>
<input id="cherryBig" class="value" type="number">
<button onclick="add('cherryBig')">+</button>
<button onclick="sub('cherryBig')">-</button></div>

<div class="row"><div class="label">単独REG</div>
<input id="soloReg" class="value" type="number">
<button onclick="add('soloReg')">+</button>
<button onclick="sub('soloReg')">-</button></div>

<div class="row"><div class="label">チェREG</div>
<input id="cherryReg" class="value" type="number">
<button onclick="add('cherryReg')">+</button>
<button onclick="sub('cherryReg')">-</button></div>

<button class="reset" onclick="resetAll()">リセット</button>

</div>

<script>
const keys = [
"game","grape","cherry","bell","missBell","pierrot","missPierrot",
"soloBig","cherryBig","soloReg","cherryReg"
];

let state = {
game:0, grape:0, cherry:0,
bell:0, missBell:0, pierrot:0, missPierrot:0,
soloBig:0, cherryBig:0, soloReg:0, cherryReg:0
};

keys.forEach(k=>{
    state[k] = Number(localStorage.getItem(k)) || 0;
});

function save(){
    keys.forEach(k=>{
        localStorage.setItem(k,state[k]);
    });
}

function flash(id,type){
    const el=document.getElementById(id);
    el.classList.add(type);
    setTimeout(()=>el.classList.remove(type),300);
}

function calcRate(count){
    return count > 0 ? "1/" + (state.game / count).toFixed(1) : "1/-";
}

function update(){

    keys.forEach(k=>{
        document.getElementById(k).value = state[k];
    });

    document.getElementById("grapeRate").innerText = calcRate(state.grape);
    document.getElementById("cherryRate").innerText = calcRate(state.cherry);

    const bigTotal = state.soloBig + state.cherryBig;
    const regTotal = state.soloReg + state.cherryReg;
    const bonusTotal = bigTotal + regTotal;

    document.getElementById("bigTotal").innerText = bigTotal;
    document.getElementById("regTotal").innerText = regTotal;
    document.getElementById("bonusTotal").innerText = bonusTotal;

    document.getElementById("bigRate").innerText = calcRate(bigTotal);
    document.getElementById("regRate").innerText = calcRate(regTotal);
    document.getElementById("bonusRate").innerText = calcRate(bonusTotal);

    save();
}

function add(key){
    state[key]++;
    flash(key,"flash-green");
    update();
}

function sub(key){
    if(state[key]>0) state[key]--;
    flash(key,"flash-red");
    update();
}

function resetAll(){
    keys.forEach(k=>state[k]=0);
    update();
}

update();
</script>

</body>
</html>
