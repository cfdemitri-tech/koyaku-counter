<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小役カウンター</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:10px;
}

h1{
    text-align:center;
    margin:5px 0 10px;
    font-size:24px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row{
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 0;
    border-bottom:1px solid #ddd;
}

.label{
    width:90px;
    font-weight:bold;
    font-size:16px;
}

.grape{ color:#00aa00; }
.cherry{ color:#ff0000; }

.value{
    width:60px;
    text-align:center;
    font-size:20px;
    border:1px solid #ccc;
    border-radius:5px;
    padding:3px;
    transition:0.15s;
}

.rate{
    margin-left:auto;
    font-size:14px;
    color:#666;
}

button{
    width:42px;
    height:42px;
    font-size:22px;
}

.reset{
    width:100%;
    height:50px;
    margin-top:10px;
}

/* 点滅用 */
.flash-green{
    box-shadow:0 0 0 3px #00ff00;
}


    .flash-red{
    box-shadow:0 0 0 3px #ff0000;
}

#battleLamp{
    position:fixed;
    top:10px;
    right:10px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#ccc;
    border:2px solid #888;
}

#battleLamp.on{
    background:#ffeb3b;
    box-shadow:0 0 20px #ffeb3b;
}

#battleToggle{
    width:100%;
    height:40px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<h1>小役カウンター</h1>
    
<div id="battleLamp"></div>

<button id="battleToggle" onclick="toggleBattle()">
設定6バトル OFF
</button>
<div class="container">

<div class="row">
<div class="label">総G</div>
<input id="game" class="value" type="number">
<button onclick="addGame()">+</button>
<button onclick="subGame()">-</button>
</div>

<div class="row">
<div class="label grape">ブドウ</div>
<input id="grape" class="value" type="number">
<button onclick="addGrape()">+</button>
<button onclick="subGrape()">-</button>
<div id="grapeRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label cherry">チェリー</div>
<input id="cherry" class="value" type="number">
<button onclick="addCherry()">+</button>
<button onclick="subCherry()">-</button>
<div id="cherryRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">ベル</div>
<input id="bell" class="value" type="number">
<button onclick="addBell()">+</button>
<button onclick="subBell()">-</button>
</div>

<div class="row">
<div class="label">ベルこぼし</div>
<input id="missBell" class="value" type="number">
<button onclick="addMissBell()">+</button>
<button onclick="subMissBell()">-</button>
</div>

<div class="row">
<div class="label">ピエロ</div>
<input id="pierrot" class="value" type="number">
<button onclick="addPierrot()">+</button>
<button onclick="subPierrot()">-</button>
</div>

<div class="row">
<div class="label">ピエロこぼし</div>
<input id="missPierrot" class="value" type="number">
<button onclick="addMissPierrot()">+</button>
<button onclick="subMissPierrot()">-</button>
</div>

<div class="row">
<div class="label">単独BIG</div>
<input id="soloBig" class="value" type="number">
<button onclick="addSoloBig()">+</button>
<button onclick="subSoloBig()">-</button>
</div>

<div class="row">
<div class="label">チェBIG</div>
<input id="cherryBig" class="value" type="number">
<button onclick="addCherryBig()">+</button>
<button onclick="subCherryBig()">-</button>
</div>

<div class="row">
<div class="label">単独REG</div>
<input id="soloReg" class="value" type="number">
<button onclick="addSoloReg()">+</button>
<button onclick="subSoloReg()">-</button>
</div>

<div class="row">
<div class="label">チェREG</div>
<input id="cherryReg" class="value" type="number">
<button onclick="addCherryReg()">+</button>
<button onclick="subCherryReg()">-</button>
</div>

<button class="reset" onclick="resetAll()">リセット</button>

</div>

<script>

let game = Number(localStorage.getItem("game")) || 0;
let grape = Number(localStorage.getItem("grape")) || 0;
let cherry = Number(localStorage.getItem("cherry")) || 0;

let bell = Number(localStorage.getItem("bell")) || 0;
let missBell = Number(localStorage.getItem("missBell")) || 0;
let pierrot = Number(localStorage.getItem("pierrot")) || 0;
let missPierrot = Number(localStorage.getItem("missPierrot")) || 0;

let soloBig = Number(localStorage.getItem("soloBig")) || 0;
let cherryBig = Number(localStorage.getItem("cherryBig")) || 0;
let soloReg = Number(localStorage.getItem("soloReg")) || 0;
let cherryReg = Number(localStorage.getItem("cherryReg")) || 0;
    
let battleMode =
localStorage.getItem("battleMode") === "true";
function toggleBattle(){
    battleMode = !battleMode;

    document.getElementById("battleToggle").innerText =
    battleMode ?
    "設定6バトル ON" :
    "設定6バトル OFF";

    localStorage.setItem(
    "battleMode",
    battleMode
    );

    update();
}

function battleCheck(){

    if(!battleMode) return;

    if(Math.floor(Math.random() * 119) === 0){

        const lamp =
        document.getElementById("battleLamp");

        lamp.classList.add("on");

        setTimeout(()=>{
            lamp.classList.remove("on");
        },1000);
    }
}    
function flashInput(id, type){
    const el = document.getElementById(id);
    el.classList.add(type);

    setTimeout(()=>{
        el.classList.remove(type);
    }, 400);
}

function update(){

document.getElementById("game").value = game;
document.getElementById("grape").value = grape;
document.getElementById("cherry").value = cherry;

document.getElementById("bell").value = bell;
document.getElementById("missBell").value = missBell;
document.getElementById("pierrot").value = pierrot;
document.getElementById("missPierrot").value = missPierrot;

document.getElementById("soloBig").value = soloBig;
document.getElementById("cherryBig").value = cherryBig;
document.getElementById("soloReg").value = soloReg;
document.getElementById("cherryReg").value = cherryReg;

document.getElementById("grapeRate").innerText =
grape > 0 ? "1/" + (game/grape).toFixed(1) : "1/-";

document.getElementById("cherryRate").innerText =
cherry > 0 ? "1/" + (game/cherry).toFixed(1) : "1/-";

localStorage.setItem("game", game);
localStorage.setItem("grape", grape);
localStorage.setItem("cherry", cherry);
localStorage.setItem("bell", bell);
localStorage.setItem("missBell", missBell);
localStorage.setItem("pierrot", pierrot);
localStorage.setItem("missPierrot", missPierrot);
localStorage.setItem("soloBig", soloBig);
localStorage.setItem("cherryBig", cherryBig);
localStorage.setItem("soloReg", soloReg);
localStorage.setItem("cherryReg", cherryReg);
document.getElementById("battleToggle").innerText =
battleMode ?
"設定6バトル ON" :
"設定6バトル OFF";

localStorage.setItem(
"battleMode",
battleMode
);
}


document.addEventListener("input", ()=>{
game = Number(gameInput()) || 0;
});

function gameInput(){
return document.getElementById("game").value;
}

function addGame(){ game++; update(); flashInput("game","flash-green"); }
function subGame(){ if(game>0) game--; update(); flashInput("game","flash-red"); }

function addGrape(){ grape++; update(); flashInput("grape","flash-green"); battleCheck(); }
function subGrape(){ if(grape>0) grape--; update(); flashInput("grape","flash-red"); }

function addCherry(){ cherry++; update(); flashInput("cherry","flash-green"); battleCheck(); }
function subCherry(){ if(cherry>0) cherry--; update(); flashInput("cherry","flash-red"); }

function addBell(){ bell++; update(); flashInput("bell","flash-green"); battleCheck(); }
function subBell(){ if(bell>0) bell--; update(); flashInput("bell","flash-red"); }

function addMissBell(){ missBell++; update(); flashInput("missBell","flash-green"); battleCheck(); }
function subMissBell(){ if(missBell>0) missBell--; update(); flashInput("missBell","flash-red"); }

function addPierrot(){ pierrot++; update(); flashInput("pierrot","flash-green"); battleCheck(); }
function subPierrot(){ if(pierrot>0) pierrot--; update(); flashInput("pierrot","flash-red"); }

function addMissPierrot(){ missPierrot++; update(); flashInput("missPierrot","flash-green"); battleCheck(); }
function subMissPierrot(){ if(missPierrot>0) missPierrot--; update(); flashInput("missPierrot","flash-red"); }

function addSoloBig(){ soloBig++; update(); flashInput("soloBig","flash-green"); battleCheck(); }
function subSoloBig(){ if(soloBig>0) soloBig--; update(); flashInput("soloBig","flash-red"); }

function addCherryBig(){ cherryBig++; update(); flashInput("cherryBig","flash-green"); battleCheck(); }
function subCherryBig(){ if(cherryBig>0) cherryBig--; update(); flashInput("cherryBig","flash-red"); }

function addSoloReg(){ soloReg++; update(); flashInput("soloReg","flash-green"); battleCheck(); }
function subSoloReg(){ if(soloReg>0) soloReg--; update(); flashInput("soloReg","flash-red"); }

function addCherryReg(){ cherryReg++; update(); flashInput("cherryReg","flash-green"); battleCheck(); }
function subCherryReg(){ if(cherryReg>0) cherryReg--; update(); flashInput("cherryReg","flash-red"); }

function resetAll(){
game=0;
grape=0;
cherry=0;
bell=0;
missBell=0;
pierrot=0;
missPierrot=0;
soloBig=0;
cherryBig=0;
soloReg=0;
cherryReg=0;
update();
}

update();

</script>

</body>
</html>
