<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子役カウンター</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:10px;
}

h1{
    text-align:center;
    margin:5px 0 10px;
    font-size:24px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.row{
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 0;
    border-bottom:1px solid #ddd;
}

.label{
    width:80px;
    font-weight:bold;
    font-size:16px;
}

.value{
    width:50px;
    text-align:center;
    font-size:20px;
}

.rate{
    margin-left:auto;
    font-size:14px;
    color:#666;
}

button{
    width:42px;
    height:42px;
    font-size:22px;
}

.reset{
    width:100%;
    height:50px;
    margin-top:10px;
}

@media (orientation: landscape){

    .container{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px 20px;
    }

    .reset{
        grid-column:1 / -1;
    }
}
</style>
</head>

<body>

<h1>子役カウンター</h1>

<div class="container">

<div class="row">
<div class="label">総G</div>
<div id="game" class="value">0</div>
<button onclick="addGame()">+</button>
<button onclick="subGame()">-</button>
</div>

<div class="row">
<div class="label">ブドウ</div>
<div id="grape" class="value">0</div>
<button onclick="addGrape()">+</button>
<button onclick="subGrape()">-</button>
<div id="grapeRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">チェリー</div>
<div id="cherry" class="value">0</div>
<button onclick="addCherry()">+</button>
<button onclick="subCherry()">-</button>
<div id="cherryRate" class="rate">1/-</div>
</div>

<div class="row">
<div class="label">単独BIG</div>
<div id="soloBig" class="value">0</div>
<button onclick="addSoloBig()">+</button>
<button onclick="subSoloBig()">-</button>
</div>

<div class="row">
<div class="label">チェBIG</div>
<div id="cherryBig" class="value">0</div>
<button onclick="addCherryBig()">+</button>
<button onclick="subCherryBig()">-</button>
</div>

<div class="row">
<div class="label">単独REG</div>
<div id="soloReg" class="value">0</div>
<button onclick="addSoloReg()">+</button>
<button onclick="subSoloReg()">-</button>
</div>

<div class="row">
<div class="label">チェREG</div>
<div id="cherryReg" class="value">0</div>
<button onclick="addCherryReg()">+</button>
<button onclick="subCherryReg()">-</button>
</div>

<button class="reset" onclick="resetAll()">リセット</button>

</div>

<script>

let game = Number(localStorage.getItem("game")) || 0;
let grape = Number(localStorage.getItem("grape")) || 0;
let cherry = Number(localStorage.getItem("cherry")) || 0;

let soloBig = Number(localStorage.getItem("soloBig")) || 0;
let cherryBig = Number(localStorage.getItem("cherryBig")) || 0;
let soloReg = Number(localStorage.getItem("soloReg")) || 0;
let cherryReg = Number(localStorage.getItem("cherryReg")) || 0;

function update(){

document.getElementById("game").innerText = game;
document.getElementById("grape").innerText = grape;
document.getElementById("cherry").innerText = cherry;

document.getElementById("soloBig").innerText = soloBig;
document.getElementById("cherryBig").innerText = cherryBig;
document.getElementById("soloReg").innerText = soloReg;
document.getElementById("cherryReg").innerText = cherryReg;

document.getElementById("grapeRate").innerText =
grape > 0 ? "1/" + (game/grape).toFixed(1) : "1/-";

document.getElementById("cherryRate").innerText =
cherry > 0 ? "1/" + (game/cherry).toFixed(1) : "1/-";

localStorage.setItem("game", game);
localStorage.setItem("grape", grape);
localStorage.setItem("cherry", cherry);

localStorage.setItem("soloBig", soloBig);
localStorage.setItem("cherryBig", cherryBig);
localStorage.setItem("soloReg", soloReg);
localStorage.setItem("cherryReg", cherryReg);

}

function addGame(){ game++; update(); }
function subGame(){ if(game>0) game--; update(); }

function addGrape(){ grape++; update(); }
function subGrape(){ if(grape>0) grape--; update(); }

function addCherry(){ cherry++; update(); }
function subCherry(){ if(cherry>0) cherry--; update(); }

function addSoloBig(){ soloBig++; update(); }
function subSoloBig(){ if(soloBig>0) soloBig--; update(); }

function addCherryBig(){ cherryBig++; update(); }
function subCherryBig(){ if(cherryBig>0) cherryBig--; update(); }

function addSoloReg(){ soloReg++; update(); }
function subSoloReg(){ if(soloReg>0) soloReg--; update(); }

function addCherryReg(){ cherryReg++; update(); }
function subCherryReg(){ if(cherryReg>0) cherryReg--; update(); }

function resetAll(){
game=0;
grape=0;
cherry=0;
soloBig=0;
cherryBig=0;
soloReg=0;
cherryReg=0;
update();
}

update();

</script>

</body>
</html>
